    sdk: flutter
  flutter_riverpod: ^2.5.1
  http: ^1.2.1
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  intl: ^0.19.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1
